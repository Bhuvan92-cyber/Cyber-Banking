version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cyber_banking
      POSTGRES_USER: cyber_user
      POSTGRES_PASSWORD: cyber_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyber_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://cyber_user:cyber_password@db:5432/cyber_banking
      - SECRET_KEY=your-secret-key
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
